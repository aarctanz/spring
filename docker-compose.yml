services:
  db:
    image: postgres:18.3-bookworm
    env_file: .env
    environment:
      POSTGRES_USER: ${PGUSER:-spring}
      POSTGRES_PASSWORD: ${PGPASSWORD:-spring}
      POSTGRES_DB: ${PGDATABASE:-spring}
    volumes:
      - pgdata:/var/lib/postgresql/18/docker
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${PGUSER:-spring} -d ${PGDATABASE:-spring}",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  spring:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${PGUSER:-spring}:${PGPASSWORD:-spring}@db:5432/${PGDATABASE:-spring}
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
    name: spring_pgdata
